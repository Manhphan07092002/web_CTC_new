    <style>
      /* Spin animation keyframe */
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .animate-spin-slow {
        animation: spin 8s linear infinite;
      }
      
      .animate-spin {
        animation: spin 1s linear infinite;
      }
      
      /* Scroll animation keyframe */
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      /* Infinite scroll animation for partners */
      @keyframes infinite-scroll {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-100%, 0, 0); }
      }
      
      /* Animation classes */
      .animate-infinite-scroll {
        animation: infinite-scroll 80s linear infinite;
        will-change: transform;
        transform: translateZ(0);
        backface-visibility: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Smooth scrolling container */
      .marquee-container {
        backface-visibility: hidden;
        perspective: 1000px;
        transform: translateZ(0);
        overflow: hidden;
      }
      
      /* Hover pause for entire container */
      .marquee-container:hover .animate-infinite-scroll {
        animation-play-state: paused !important;
      }
      
      /* Pause animation utility */
      .pause-animation {
        animation-play-state: paused !important;
      }
      
      /* Background gradient animation */

  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Placeholder image
    const PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent('<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="400" height="300" fill="#F3F4F6"/><g transform="translate(110, 60)"><path d="M160 120L110 60L80 95L30 30L0 120H160Z" fill="#D1D5DB"/><circle cx="130" cy="35" r="20" fill="#D1D5DB"/></g><text x="200" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="#9CA3AF">No Image</text></svg>');
    
    // Check and fix images on error
    document.addEventListener('error', function(e) {
      if (e.target.tagName === 'IMG' && !e.target.dataset.fixed) {
        e.target.dataset.fixed = 'true';
        e.target.src = PLACEHOLDER;
        e.target.alt = '';
      }
    }, true);
    
    // Check all images on load
    function checkImage(img) {
      if (!img || !img.dataset || img.dataset.fixed) return;
      
      // Check if image is broken or empty
      const isBroken = !img.src || 
                       img.src === '' || 
                       img.src === window.location.href ||
                       img.src.startsWith('data:text') ||
                       (img.complete && img.naturalWidth === 0);
      
      if (isBroken) {
        img.dataset.fixed = 'true';
        img.src = PLACEHOLDER;
        img.alt = '';
      }
    }
    
    // Check images periodically
    setInterval(function() {
      document.querySelectorAll('img').forEach(checkImage);
    }, 300);
    
    // Also check on load event
    document.addEventListener('load', function(e) {
      if (e.target && e.target.tagName === 'IMG') {
        var imgRef = e.target;
        setTimeout(function() { 
          if (imgRef && document.contains(imgRef)) {
            checkImage(imgRef); 
          }
        }, 100);
      }
    }, true);
  </script>
