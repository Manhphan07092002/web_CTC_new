services:
  # ─── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ctc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-ctcadmin2024}
      MONGO_INITDB_DATABASE: ctc_web_new
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - ctc_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── App (Express API + Vite static) ───────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ctc_app
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      # Override MONGO_URI to point to the mongo service
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-ctcadmin2024}@mongo:27017/ctc_web_new?authSource=admin
      FRONTEND_URL: http://localhost
      CORS_ORIGIN: http://localhost
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - ctc_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Nginx reverse proxy (optional but recommended) ────────────
  nginx:
    image: nginx:alpine
    container_name: ctc_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # mount SSL certs nếu có
    networks:
      - ctc_network

volumes:
  mongo_data:
  mongo_config:
  uploads_data:

networks:
  ctc_network:
    driver: bridge
